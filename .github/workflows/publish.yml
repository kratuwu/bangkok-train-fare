name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Prepare publish version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION"
              exit 1
            fi
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
            exit 0
          fi

          BASE_VERSION=$(node -p "require('./package.json').version.replace(/-.*/, '')")
          SHORT_SHA="${GITHUB_SHA::7}"
          SNAPSHOT_VERSION="${BASE_VERSION}-snapshot.${SHORT_SHA}"
          npm version "$SNAPSHOT_VERSION" --no-git-tag-version
          echo "NPM_TAG=snapshot" >> "$GITHUB_ENV"
          echo "Publishing snapshot version $SNAPSHOT_VERSION"

      - name: Publish to npm
        run: npm publish --access public --tag "$NPM_TAG" --provenance
